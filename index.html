<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ペプチド結合 電子雲 AR (マーカーレス) | 状態切替付き</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            color: white;
            padding: 10px 18px;
            border-radius: 12px;
            pointer-events: none;
            z-index: 10;
            border-left: 5px solid #ffaa44;
            font-size: 14px;
            max-width: 260px;
        }
        #controls {
            position: absolute;
            bottom: 25px;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 20;
            pointer-events: none;
        }
        .state-buttons {
            background: rgba(30,30,40,0.85);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 8px 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.2);
        }
        button {
            background: #1e2a3a;
            border: none;
            color: white;
            font-size: 12px;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 40px;
            cursor: pointer;
            border-bottom: 2px solid #3a5a7a;
            transition: 0.1s;
        }
        button:active {
            transform: scale(0.96);
        }
        button.active {
            background: #ff6b4a;
            border-bottom-color: #ffaa88;
            box-shadow: 0 0 8px rgba(255,107,74,0.5);
        }
        #arButton {
            background: #ff6b4a;
            font-size: 18px;
            padding: 12px 24px;
            border-bottom-color: #aa4433;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .status {
            position: absolute;
            bottom: 25px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 20px;
            color: #ffdd99;
            font-size: 11px;
            pointer-events: none;
            font-family: monospace;
            z-index: 10;
        }
        .legend {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(5px);
            padding: 12px 16px;
            border-radius: 16px;
            color: white;
            font-size: 12px;
            border-right: 3px solid #ffaa44;
            pointer-events: none;
            z-index: 10;
        }
        .legend span {
            display: inline-block;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
            box-shadow: 0 0 2px white;
        }
        .note {
            position: absolute;
            bottom: 25px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            color: #ccc;
            pointer-events: none;
        }
        @media (max-width: 700px) {
            .legend { font-size: 9px; top: 10px; right: 10px; padding: 8px 12px; }
            #info { font-size: 10px; top: 10px; left: 10px; max-width: 200px; }
            button { font-size: 10px; padding: 5px 10px; }
            #arButton { font-size: 16px; padding: 10px 20px; }
        }
    </style>
</head>
<body>
    <div id="info">
        <div>🧬 ペプチド結合 電子雲 AR</div>
        <div style="font-size:12px;">マーカーレス | 状態ボタンで電子雲変化</div>
    </div>
    <div class="legend">
        <div><span style="background:#ff6666;"></span> π電子雲</div>
        <div><span style="background:#44aaff;"></span> N孤立電子対</div>
        <div><span style="background:#55ff77;"></span> O孤立電子対</div>
        <div><span style="background:#ffaa44;"></span> H⁺</div>
        <div><span style="background:#ffffff;"></span> C, O, N, H</div>
    </div>
    <div id="controls">
        <button id="arButton">🔘 AR開始 (カメラを許可)</button>
        <div class="state-buttons" id="stateButtons" style="display: none;">
            <button id="step0" class="active">①通常</button>
            <button id="step1">②H⁺接近</button>
            <button id="step2">③共鳴崩壊</button>
            <button id="step3">④N電子回帰</button>
            <button id="step4">⑤C-N柔軟化</button>
        </div>
    </div>
    <div class="status" id="statusText">待機中 | AR開始ボタンを押してください</div>
    <div class="note">⚠️ httpsまたはlocalhostで動作 | スマホ推奨 | AR開始後、状態ボタンで電子雲が変化</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        // --- セットアップ (AR対応) ---
        const scene = new THREE.Scene();
        scene.background = null; // 透明 → カメラ映像

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 照明 (ARでは明るめ)
        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(2, 3, 1.5);
        const fillLight = new THREE.PointLight(0x88aaff, 0.5);
        fillLight.position.set(0, 1.5, 2);
        scene.add(ambient, mainLight, fillLight);

        // 簡易グリッド (空間の目安)
        const gridHelper = new THREE.GridHelper(2, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.5;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.4;
        scene.add(gridHelper);

        // ========== ヘルパー関数 (原子・結合・電子雲) ==========
        function addAtom(x, y, z, color, radius, emissive = false) {
            const geom = new THREE.SphereGeometry(radius, 64, 64);
            const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.1, emissive: emissive ? 0x442200 : 0x000000 });
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.set(x, y, z);
            return mesh;
        }
        
        function addBond(p1, p2, color, radius) {
            const start = new THREE.Vector3(p1.x, p1.y, p1.z);
            const end = new THREE.Vector3(p2.x, p2.y, p2.z);
            const dir = new THREE.Vector3().subVectors(end, start);
            const len = dir.length();
            const center = start.clone().add(end).multiplyScalar(0.5);
            const geometry = new THREE.CylinderGeometry(radius, radius, len, 12);
            const material = new THREE.MeshStandardMaterial({ color: color, roughness: 0.5 });
            const cylinder = new THREE.Mesh(geometry, material);
            cylinder.position.copy(center);
            cylinder.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.clone().normalize());
            return cylinder;
        }
        
        function createElectronCloud(color, posX, posY, posZ, scaleX, scaleY, scaleZ, opacity, emissiveTone) {
            const geometry = new THREE.SphereGeometry(0.65, 48, 48);
            const material = new THREE.MeshStandardMaterial({
                color: color,
                emissive: emissiveTone ? color : 0x000000,
                emissiveIntensity: 0.18,
                transparent: true,
                opacity: opacity,
                roughness: 0.4,
                metalness: 0.05
            });
            const cloud = new THREE.Mesh(geometry, material);
            cloud.position.set(posX, posY, posZ);
            cloud.scale.set(scaleX, scaleY, scaleZ);
            return cloud;
        }
        
        function addAdvancedCloud(color, pos, scaleVec, opacity, extraGlow) {
            const group = new THREE.Group();
            const main = createElectronCloud(color, 0, 0, 0, scaleVec.x, scaleVec.y, scaleVec.z, opacity, extraGlow);
            group.add(main);
            const sub1 = createElectronCloud(color, 0.12, 0.08, -0.1, scaleVec.x*0.65, scaleVec.y*0.7, scaleVec.z*0.6, opacity*0.7, false);
            const sub2 = createElectronCloud(color, -0.1, -0.05, 0.12, scaleVec.x*0.55, scaleVec.y*0.6, scaleVec.z*0.6, opacity*0.6, false);
            group.add(sub1, sub2);
            group.position.copy(pos);
            return group;
        }
        
        // ========== 5つの状態を構築する関数 (元のHTMLから移植) ==========
        // 状態0: 通常
        function buildStage0() {
            const group = new THREE.Group();
            const cPos = new THREE.Vector3(0.0, 0.05, 0.0);
            const oPos = new THREE.Vector3(1.12, 0.08, 0.0);
            const nPos = new THREE.Vector3(-0.98, -0.02, 0.0);
            const hPos = new THREE.Vector3(-1.52, -0.48, 0.0);
            const caPos = new THREE.Vector3(-1.25, 0.92, 0.0);
            
            group.add(addAtom(cPos.x, cPos.y, cPos.z, 0xcccccc, 0.24));
            group.add(addAtom(oPos.x, oPos.y, oPos.z, 0xff8866, 0.22));
            group.add(addAtom(nPos.x, nPos.y, nPos.z, 0x77aaff, 0.23));
            group.add(addAtom(hPos.x, hPos.y, hPos.z, 0xeeeeff, 0.18));
            group.add(addAtom(caPos.x, caPos.y, caPos.z, 0xccccaa, 0.22));
            group.add(addBond(cPos, oPos, 0xdd9977, 0.07));
            group.add(addBond(cPos, nPos, 0xccaa88, 0.07));
            group.add(addBond(nPos, hPos, 0x99aacc, 0.05));
            group.add(addBond(nPos, caPos, 0x99aacc, 0.05));
            
            const piCloud = addAdvancedCloud(0xff6666, new THREE.Vector3(0.05,0.2,0.45), new THREE.Vector3(1.5,0.9,1.2), 0.65, true);
            const piCloud2 = addAdvancedCloud(0xff5577, new THREE.Vector3(0.0,-0.15,-0.5), new THREE.Vector3(1.2,0.7,1.1), 0.55, false);
            group.add(piCloud, piCloud2);
            
            const nLone1 = addAdvancedCloud(0x44aaff, new THREE.Vector3(-1.15,0.15,0.75), new THREE.Vector3(1.0,0.9,0.85), 0.7, true);
            const nLone2 = addAdvancedCloud(0x77ccff, new THREE.Vector3(-1.3,-0.35,0.55), new THREE.Vector3(0.75,0.7,0.7), 0.6, false);
            group.add(nLone1, nLone2);
            
            const oLone1 = addAdvancedCloud(0x55ff77, new THREE.Vector3(1.35,0.6,0.4), new THREE.Vector3(0.8,0.7,0.85), 0.7, true);
            const oLone2 = addAdvancedCloud(0x77ff99, new THREE.Vector3(1.3,-0.4,-0.5), new THREE.Vector3(0.85,0.75,0.75), 0.65, false);
            group.add(oLone1, oLone2);
            
            return group;
        }
        
        // 状態1: H⁺接近
        function buildStage1() {
            const group = new THREE.Group();
            const cPos = new THREE.Vector3(0.0, 0.05, 0.0);
            const oPos = new THREE.Vector3(1.12, 0.08, 0.0);
            const nPos = new THREE.Vector3(-0.98, -0.02, 0.0);
            const hPos = new THREE.Vector3(-1.52, -0.48, 0.0);
            const caPos = new THREE.Vector3(-1.25, 0.92, 0.0);
            const protonPos = new THREE.Vector3(-1.4, 0.4, 0.95);
            
            group.add(addAtom(cPos.x, cPos.y, cPos.z, 0xcccccc, 0.24));
            group.add(addAtom(oPos.x, oPos.y, oPos.z, 0xff8866, 0.22));
            group.add(addAtom(nPos.x, nPos.y, nPos.z, 0x77aaff, 0.23));
            group.add(addAtom(hPos.x, hPos.y, hPos.z, 0xeeeeff, 0.18));
            group.add(addAtom(caPos.x, caPos.y, caPos.z, 0xccccaa, 0.22));
            const proton = addAtom(protonPos.x, protonPos.y, protonPos.z, 0xffaa66, 0.17, true);
            group.add(proton);
            
            group.add(addBond(cPos, oPos, 0xdd9977, 0.07));
            group.add(addBond(cPos, nPos, 0xccaa88, 0.07));
            group.add(addBond(nPos, hPos, 0x99aacc, 0.05));
            group.add(addBond(nPos, caPos, 0x99aacc, 0.05));
            
            const nCloud = addAdvancedCloud(0x44aaff, new THREE.Vector3(-1.25,0.2,0.85), new THREE.Vector3(1.1,0.95,1.2), 0.75, true);
            const protonBridge = addAdvancedCloud(0x55bbff, new THREE.Vector3(-1.38,0.38,0.9), new THREE.Vector3(0.65,0.6,0.7), 0.55, false);
            group.add(nCloud, protonBridge);
            
            const piCloud = addAdvancedCloud(0xff6666, new THREE.Vector3(0.15,0.2,0.45), new THREE.Vector3(1.3,0.85,1.1), 0.6, true);
            group.add(piCloud);
            
            const oLone1 = addAdvancedCloud(0x55ff77, new THREE.Vector3(1.35,0.6,0.4), new THREE.Vector3(0.8,0.7,0.85), 0.65, false);
            const oLone2 = addAdvancedCloud(0x77ff99, new THREE.Vector3(1.3,-0.4,-0.5), new THREE.Vector3(0.85,0.75,0.75), 0.6, false);
            group.add(oLone1, oLone2);
            return group;
        }
        
        // 状態2: 共鳴崩壊
        function buildStage2() {
            const group = new THREE.Group();
            const cPos = new THREE.Vector3(0.0, 0.05, 0.0);
            const oPos = new THREE.Vector3(1.12, 0.08, 0.0);
            const nPos = new THREE.Vector3(-0.98, -0.02, 0.0);
            const hPos = new THREE.Vector3(-1.52, -0.48, 0.0);
            const caPos = new THREE.Vector3(-1.25, 0.92, 0.0);
            const protonPos = new THREE.Vector3(-1.3, 0.15, 0.7);
            
            group.add(addAtom(cPos.x, cPos.y, cPos.z, 0xcccccc, 0.24));
            group.add(addAtom(oPos.x, oPos.y, oPos.z, 0xff8866, 0.22));
            group.add(addAtom(nPos.x, nPos.y, nPos.z, 0x77aaff, 0.23));
            group.add(addAtom(hPos.x, hPos.y, hPos.z, 0xeeeeff, 0.18));
            group.add(addAtom(caPos.x, caPos.y, caPos.z, 0xccccaa, 0.22));
            const proton = addAtom(protonPos.x, protonPos.y, protonPos.z, 0xffaa66, 0.18, true);
            group.add(proton);
            
            group.add(addBond(nPos, protonPos, 0xddcc99, 0.06));
            group.add(addBond(cPos, oPos, 0xdd8866, 0.08));
            group.add(addBond(cPos, nPos, 0xccaa88, 0.07));
            group.add(addBond(nPos, hPos, 0x99aacc, 0.05));
            group.add(addBond(nPos, caPos, 0x99aacc, 0.05));
            
            const piOxy = addAdvancedCloud(0xff6666, new THREE.Vector3(0.95,0.5,0.4), new THREE.Vector3(1.2,1.0,1.1), 0.75, true);
            group.add(piOxy);
            
            const nCloudSmall = addAdvancedCloud(0x44aaff, new THREE.Vector3(-1.15,-0.25,0.6), new THREE.Vector3(0.55,0.55,0.5), 0.45, false);
            group.add(nCloudSmall);
            
            const oLone1 = addAdvancedCloud(0x55ff77, new THREE.Vector3(1.4,0.65,0.35), new THREE.Vector3(0.95,0.85,0.9), 0.8, true);
            const oLone2 = addAdvancedCloud(0x77ff99, new THREE.Vector3(1.35,-0.45,-0.55), new THREE.Vector3(0.95,0.85,0.8), 0.75, false);
            group.add(oLone1, oLone2);
            return group;
        }
        
        // 状態3: N電子回帰
        function buildStage3() {
            const group = new THREE.Group();
            const cPos = new THREE.Vector3(0.0, 0.05, 0.0);
            const oPos = new THREE.Vector3(1.12, 0.08, 0.0);
            const nPos = new THREE.Vector3(-0.98, -0.02, 0.0);
            const hPos = new THREE.Vector3(-1.52, -0.48, 0.0);
            const caPos = new THREE.Vector3(-1.25, 0.92, 0.0);
            
            group.add(addAtom(cPos.x, cPos.y, cPos.z, 0xcccccc, 0.24));
            group.add(addAtom(oPos.x, oPos.y, oPos.z, 0xff8866, 0.22));
            group.add(addAtom(nPos.x, nPos.y, nPos.z, 0x77aaff, 0.23));
            group.add(addAtom(hPos.x, hPos.y, hPos.z, 0xeeeeff, 0.18));
            group.add(addAtom(caPos.x, caPos.y, caPos.z, 0xccccaa, 0.22));
            group.add(addBond(cPos, oPos, 0xdd9977, 0.07));
            group.add(addBond(cPos, nPos, 0xccaa88, 0.07));
            group.add(addBond(nPos, hPos, 0x99aacc, 0.05));
            group.add(addBond(nPos, caPos, 0x99aacc, 0.05));
            
            const nCloudBig = addAdvancedCloud(0x44aaff, new THREE.Vector3(-1.2,0.1,0.8), new THREE.Vector3(1.15,1.05,1.0), 0.8, true);
            group.add(nCloudBig);
            
            const piCloud = addAdvancedCloud(0xff6666, new THREE.Vector3(0.05,0.25,0.45), new THREE.Vector3(1.4,0.9,1.2), 0.65, true);
            group.add(piCloud);
            
            const oLone1 = addAdvancedCloud(0x55ff77, new THREE.Vector3(1.35,0.6,0.4), new THREE.Vector3(0.85,0.75,0.85), 0.7, false);
            const oLone2 = addAdvancedCloud(0x77ff99, new THREE.Vector3(1.3,-0.4,-0.5), new THREE.Vector3(0.9,0.8,0.75), 0.7, false);
            group.add(oLone1, oLone2);
            return group;
        }
        
        // 状態4: C-N柔軟化 (平面性喪失)
        function buildStage4() {
            const group = new THREE.Group();
            const cPos = new THREE.Vector3(0.0, 0.05, 0.0);
            const oPos = new THREE.Vector3(1.12, 0.08, 0.0);
            const nPos = new THREE.Vector3(-0.85, -0.45, 0.65);
            const hPos = new THREE.Vector3(-1.4, -0.95, 0.55);
            const caPos = new THREE.Vector3(-1.15, 0.65, 0.8);
            
            group.add(addAtom(cPos.x, cPos.y, cPos.z, 0xcccccc, 0.24));
            group.add(addAtom(oPos.x, oPos.y, oPos.z, 0xff8866, 0.22));
            group.add(addAtom(nPos.x, nPos.y, nPos.z, 0x88aaff, 0.24));
            group.add(addAtom(hPos.x, hPos.y, hPos.z, 0xeeeeff, 0.18));
            group.add(addAtom(caPos.x, caPos.y, caPos.z, 0xccccaa, 0.22));
            group.add(addBond(cPos, oPos, 0xdd9977, 0.07));
            group.add(addBond(cPos, nPos, 0xccaa88, 0.08));
            group.add(addBond(nPos, hPos, 0x99aacc, 0.05));
            group.add(addBond(nPos, caPos, 0x99aacc, 0.05));
            
            const piCloudFlex = addAdvancedCloud(0xff6666, new THREE.Vector3(0.4,0.5,0.3), new THREE.Vector3(1.15,0.85,1.05), 0.6, true);
            group.add(piCloudFlex);
            
            const nCloudFlex = addAdvancedCloud(0x44aaff, new THREE.Vector3(-1.05,-0.25,1.05), new THREE.Vector3(0.95,0.9,0.9), 0.7, false);
            const nCloudFlex2 = addAdvancedCloud(0x77ccff, new THREE.Vector3(-0.95,0.6,0.7), new THREE.Vector3(0.75,0.7,0.7), 0.6, false);
            group.add(nCloudFlex, nCloudFlex2);
            
            const oLone1 = addAdvancedCloud(0x55ff77, new THREE.Vector3(1.35,0.6,0.3), new THREE.Vector3(0.85,0.75,0.85), 0.7, false);
            const oLone2 = addAdvancedCloud(0x77ff99, new THREE.Vector3(1.3,-0.4,-0.4), new THREE.Vector3(0.9,0.8,0.75), 0.7, false);
            group.add(oLone1, oLone2);
            return group;
        }
        
        const stageBuilders = [buildStage0, buildStage1, buildStage2, buildStage3, buildStage4];
        const stepNames = [
            "通常状態: 平面ペプチド結合・π電子非局在化",
            "H⁺接近: 水素イオンがN孤立電子対と相互作用",
            "共鳴崩壊: π電子が酸素側に偏在・N電子密度減少",
            "N電子回帰: 孤立電子対回復・平面性復元",
            "C-N柔軟化: 平面性喪失・結合回転可能"
        ];
        
        let currentModelGroup = null;
        
        function switchStage(index) {
            if (currentModelGroup) scene.remove(currentModelGroup);
            const newGroup = stageBuilders[index]();
            currentModelGroup = newGroup;
            // ARではモデルを適度なスケール・位置に (原点に配置、スケール調整)
            currentModelGroup.position.set(0, 0, 0);
            currentModelGroup.scale.set(0.8, 0.8, 0.8);
            scene.add(currentModelGroup);
            document.getElementById("statusText").innerHTML = `状態: ${stepNames[index]}`;
            // ボタンのアクティブ表示更新
            for (let i=0; i<=4; i++) {
                const btn = document.getElementById(`step${i}`);
                if (btn) {
                    if (i === index) btn.classList.add("active");
                    else btn.classList.remove("active");
                }
            }
        }
        
        // AR開始処理
        let xrSessionActive = false;
        const arButton = document.getElementById('arButton');
        const stateButtonsDiv = document.getElementById('stateButtons');
        
        arButton.addEventListener('click', () => {
            // Three.jsのARButtonを作成してクリックすると、自動的にXRセッションが始まる
            const arBtn = ARButton.createButton(renderer, { requiredFeatures: ['local-floor'] });
            // 既存のボタンを置き換える
            arBtn.style.display = 'none';
            document.body.appendChild(arBtn);
            arBtn.click();
            // セッション開始を検知する簡易的な方法: renderer.xrのセッションを監視
            const checkInterval = setInterval(() => {
                if (renderer.xr.isPresenting) {
                    clearInterval(checkInterval);
                    xrSessionActive = true;
                    arButton.style.display = 'none';
                    stateButtonsDiv.style.display = 'flex';
                    document.getElementById('statusText').innerHTML = 'AR稼働中 | 状態ボタンで電子雲切替';
                    // 最初の状態を表示 (状態0)
                    switchStage(0);
                }
            }, 500);
            // タイムアウト
            setTimeout(() => clearInterval(checkInterval), 10000);
        });
        
        // 状態ボタンのイベント登録
        document.getElementById('step0').addEventListener('click', () => { if (xrSessionActive) switchStage(0); });
        document.getElementById('step1').addEventListener('click', () => { if (xrSessionActive) switchStage(1); });
        document.getElementById('step2').addEventListener('click', () => { if (xrSessionActive) switchStage(2); });
        document.getElementById('step3').addEventListener('click', () => { if (xrSessionActive) switchStage(3); });
        document.getElementById('step4').addEventListener('click', () => { if (xrSessionActive) switchStage(4); });
        
        // レンダリングループ (AR対応)
        function animate() {
            renderer.setAnimationLoop(() => {
                renderer.render(scene, camera);
            });
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // WebXR非対応の場合のフォールバック
        if (!navigator.xr) {
            document.getElementById('statusText').innerHTML = '⚠️ お使いのブラウザはWebXR非対応です。スマホのChrome/Safariをお試しください。';
            arButton.disabled = true;
        }
        
        // 初期表示はモデルなし (AR開始まで)
    </script>
</body>
</html>
